name: Playwright Tests

on:
  push:
    branches: [main, master, develop]

  pull_request:
    branches: [main, master]

  workflow_dispatch:
    inputs:
      env:
        description: 'Environment'
        required: false
        default: 'staging'

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Check TypeScript
        run: npm run typecheck

      - name: Print environment
        if: github.event_name == 'workflow_dispatch'
        run: 'echo "Running on env: ${{ inputs.env }}"'

      - name: Run Playwright tests
        run: npx playwright test

      - name: Generate Allure report
        if: always()
        run: npm run report:allure

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: reports/playwright-html/
          retention-days: 30

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-report
          path: reports/allure-report/
          retention-days: 30

      - name: Add report link to summary
        if: always()
        run: |
          echo "## 🎭 Playwright Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Details |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Playwright & Allure reports | [Download artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
